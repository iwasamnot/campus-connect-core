<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force Update - CampusConnect</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            margin-top: 0;
            font-size: 2em;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        button:hover {
            background: #4338ca;
            transform: scale(1.05);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.error {
            background: rgba(239, 68, 68, 0.3);
        }
        .status.success {
            background: rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Force Update</h1>
        <p>This will clear all caches and force a fresh download of the latest version.</p>
        
        <button onclick="forceUpdate()">Clear Cache & Reload</button>
        <button onclick="unregisterSW()">Unregister Service Worker</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
        }

        async function forceUpdate() {
            try {
                showStatus('Clearing caches...', 'info');
                
                // Unregister all service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        console.log('Unregistered service worker:', registration.scope);
                    }
                }
                
                // Clear all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                    console.log('Cleared caches:', cacheNames);
                }
                
                // Clear storage
                localStorage.clear();
                sessionStorage.clear();
                
                showStatus('✅ Cache cleared! Reloading...', 'success');
                
                // Force reload with cache bypass
                setTimeout(() => {
                    window.location.href = '/?v=' + Date.now();
                }, 1000);
            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
                console.error('Force update error:', error);
            }
        }

        async function unregisterSW() {
            try {
                showStatus('Unregistering service workers...', 'info');
                
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        console.log('Unregistered:', registration.scope);
                    }
                    showStatus('✅ Service workers unregistered!', 'success');
                } else {
                    showStatus('Service workers not supported', 'error');
                }
            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
                console.error('Unregister error:', error);
            }
        }
    </script>
</body>
</html>
